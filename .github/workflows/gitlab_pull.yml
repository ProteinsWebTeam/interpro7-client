name: Trigger GitLab pull
on: push
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Notify GitLab
        run: |
          curl --fail --request POST \
            --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_MIRRORING_TOKEN }}" \
            --url "https://gitlab.ebi.ac.uk/api/v4/projects/5753/mirror/pull"
